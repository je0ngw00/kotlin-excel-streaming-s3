server:
  port: 8080
  # 대용량 업로드를 위해 multipart 한도 상향 (기본 1MB/10MB → 넉넉히)
  # ※ 진짜 대용량이면 S3 스트리밍 업로드로 multipart 자체를 우회하는 게 정석(가이드 1차 참고)
  tomcat:
    max-swallow-size: -1

spring:
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
      file-size-threshold: 2KB   # 이 크기 넘으면 메모리 대신 디스크 임시파일로
  datasource:
    url: jdbc:h2:mem:excelstream;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          batch_size: 1000     # JDBC batch insert
        order_inserts: true

# LocalStack S3 접속 정보
app:
  s3:
    endpoint: http://localhost:4566
    region: us-east-1
    bucket: excel-bucket
    access-key: test           # LocalStack은 아무 값이나 OK
    secret-key: test
